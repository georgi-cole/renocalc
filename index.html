<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ICO – Innovation Creation Opportunities. Renovation tracking and reporting app.">
  <title>ICO – Renovation Reporting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <!-- ════════════════════════════════════════════
       SPLASH SCREEN
       ════════════════════════════════════════════ -->
  <div id="splash" role="status" aria-label="Loading ICO app">
    <div class="splash-word" aria-hidden="true"></div>
    <div class="splash-logo" aria-hidden="true"><span>I</span>CO</div>
    <div class="splash-tagline" aria-hidden="true">Renovation Reporting</div>
  </div>


  <!-- ════════════════════════════════════════════
       PROFILE / AUTH SCREEN  (local / fallback mode)
       ════════════════════════════════════════════ -->
  <div id="profile-screen" class="hidden">
    <div class="profile-card">
      <div class="lang-selector" id="lang-selector">
        <button class="lang-btn active" data-lang="en" aria-label="English">🇺🇸</button>
        <button class="lang-btn" data-lang="bg" aria-label="Bulgarian">🇧🇬</button>
      </div>

      <div class="profile-brand">
        <div class="brand-mark"><span>I</span>CO</div>
        <p data-i18n="brand.tagline">Renovation Reporting</p>
      </div>

      <p class="text-muted mb-2" style="font-size:.88rem;text-align:center" data-i18n="login.select">Select your profile to continue</p>
      <div class="profile-list" id="profile-list">
        <!-- rendered by JS -->
      </div>

      <div class="profile-divider" data-i18n="login.or">or create a new profile</div>

      <form class="new-profile-form" id="new-profile-form" novalidate>
        <div class="form-group">
          <label for="pname" data-i18n="login.fullname">Full Name</label>
          <input class="form-control" id="pname" name="pname" type="text" data-i18n-placeholder="login.fullname.placeholder" placeholder="Your full name" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="prole"><span data-i18n="login.role">Role</span> <span class="text-muted">(<span data-i18n="login.optional">optional</span>)</span></label>
          <input class="form-control" id="prole" name="prole" type="text" data-i18n-placeholder="login.role.placeholder" placeholder="e.g. Project Manager" autocomplete="organization-title">
        </div>
        <button type="submit" class="btn btn-outline btn-full" data-i18n="login.createbtn">Create Profile &amp; Sign In</button>
      </form>
    </div>
  </div>


  <!-- ════════════════════════════════════════════
       AUTH SCREEN  (Supabase email/password mode)
       ════════════════════════════════════════════ -->
  <div id="auth-screen" class="hidden">
    <div class="profile-card">
      <div class="lang-selector">
        <button class="lang-btn active" data-lang="en" aria-label="English">🇺🇸</button>
        <button class="lang-btn" data-lang="bg" aria-label="Bulgarian">🇧🇬</button>
      </div>

      <div class="profile-brand">
        <div class="brand-mark"><span>I</span>CO</div>
        <p data-i18n="brand.tagline">Renovation Reporting</p>
      </div>

      <!-- Tab switcher -->
      <div class="auth-tabs" role="tablist">
        <button class="auth-tab active" data-auth-tab="signin" role="tab" aria-selected="true" data-i18n="auth.signin">Sign In</button>
        <button class="auth-tab" data-auth-tab="signup" role="tab" aria-selected="false" data-i18n="auth.signup">Sign Up</button>
      </div>

      <!-- Sign In form -->
      <form class="auth-form" id="signin-form" novalidate>
        <div class="form-group">
          <label for="signin-email" data-i18n="auth.email">Email</label>
          <input class="form-control" id="signin-email" name="email" type="email" autocomplete="email" required
            data-i18n-placeholder="auth.email.placeholder" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="signin-password" data-i18n="auth.password">Password</label>
          <input class="form-control" id="signin-password" name="password" type="password" autocomplete="current-password" required
            data-i18n-placeholder="auth.password.placeholder" placeholder="Your password">
        </div>
        <div class="auth-error hidden" id="signin-error" role="alert"></div>
        <button type="submit" class="btn btn-primary btn-full" data-i18n="auth.signinbtn">Sign In</button>
      </form>

      <!-- Sign Up form -->
      <form class="auth-form hidden" id="signup-form" novalidate>
        <div class="form-group">
          <label for="signup-name" data-i18n="auth.displayname">Your Name</label>
          <input class="form-control" id="signup-name" name="displayName" type="text" autocomplete="name" required
            data-i18n-placeholder="auth.displayname.placeholder" placeholder="Your full name">
        </div>
        <div class="form-group">
          <label for="signup-email" data-i18n="auth.email">Email</label>
          <input class="form-control" id="signup-email" name="email" type="email" autocomplete="email" required
            data-i18n-placeholder="auth.email.placeholder" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="signup-password" data-i18n="auth.password">Password</label>
          <input class="form-control" id="signup-password" name="password" type="password" autocomplete="new-password" required minlength="8"
            data-i18n-placeholder="auth.password.new.placeholder" placeholder="Min 8 characters">
        </div>
        <div class="auth-error hidden" id="signup-error" role="alert"></div>
        <button type="submit" class="btn btn-primary btn-full" data-i18n="auth.signupbtn">Create Account</button>
      </form>
    </div>
  </div>


  <!-- ════════════════════════════════════════════
       MAIN APP SHELL
       ════════════════════════════════════════════ -->
  <div id="app" class="hidden">

    <!-- Sidebar overlay (mobile) -->
    <div id="sidebar-overlay" class="sidebar-overlay hidden" aria-hidden="true"></div>

    <!-- ─── Sidebar Navigation ─── -->
    <nav class="sidebar" id="sidebar" role="navigation" aria-label="Main navigation">
      <div class="sidebar-brand">
        <div class="brand-mark"><span>I</span>CO</div>
        <button class="btn btn-ghost btn-icon mobile-only" id="sidebar-close-btn" aria-label="Close menu" style="color:rgba(255,255,255,.7)">✕</button>
      </div>

      <div class="sidebar-user">
        <div class="avatar" aria-hidden="true">AR</div>
        <div>
          <div class="uname">Loading…</div>
          <div class="urole">User</div>
        </div>
      </div>

      <div class="sidebar-nav">
        <div class="nav-section-label" data-i18n="nav.section.main">Main</div>

        <button class="nav-item active" data-nav="dashboard" aria-current="page">
          <span class="nav-icon" aria-hidden="true">🏠</span>
          <span data-i18n="nav.dashboard">Dashboard</span>
        </button>

        <button class="nav-item" data-nav="activities">
          <span class="nav-icon" aria-hidden="true">🔨</span>
          <span data-i18n="nav.activities">Activities</span>
        </button>

        <div class="nav-section-label" data-i18n="nav.section.insights">Insights</div>

        <button class="nav-item" data-nav="reports">
          <span class="nav-icon" aria-hidden="true">📊</span>
          <span data-i18n="nav.reports">Reports</span>
        </button>

        <button class="nav-item" data-nav="auditlog">
          <span class="nav-icon" aria-hidden="true">📜</span>
          <span data-i18n="nav.auditlog">Audit Log</span>
        </button>

        <div class="nav-section-label" data-i18n="nav.section.app">App</div>

        <button class="nav-item" data-nav="settings">
          <span class="nav-icon" aria-hidden="true">⚙️</span>
          <span data-i18n="nav.settings">Settings</span>
        </button>
      </div>

      <div class="sidebar-footer">
        <button data-action="logout" aria-label="Sign out">
          <span aria-hidden="true">🚪</span> <span data-i18n="nav.signout">Sign Out</span>
        </button>
      </div>
    </nav>

    <!-- ─── Top Bar ─── -->
    <header class="topbar" role="banner">
      <button class="btn btn-ghost btn-icon mobile-only" id="hamburger" aria-label="Open menu" aria-expanded="false" aria-controls="sidebar">
        <span aria-hidden="true">☰</span>
      </button>
      <div class="brand-mark desktop-only"><span>I</span>CO</div>
      <span class="topbar-title" id="topbar-title">Dashboard</span>
      <div class="topbar-actions">
        <button class="btn btn-ghost btn-icon" data-action="logout" aria-label="Sign out" title="Sign out">
          <span aria-hidden="true">🚪</span>
        </button>
      </div>
    </header>

    <!-- ─── Main Content ─── -->
    <main class="main-content" id="main-page" role="main">
      <!-- rendered by JS -->
    </main>

    <!-- ─── Bottom Navigation (mobile) ─── -->
    <nav class="bottom-nav" role="navigation" aria-label="Bottom navigation">
      <button class="bottom-nav-item active" data-nav="dashboard">
        <span class="nav-icon" aria-hidden="true">🏠</span>
        <span data-i18n="nav.home">Home</span>
      </button>
      <button class="bottom-nav-item" data-nav="activities">
        <span class="nav-icon" aria-hidden="true">🔨</span>
        <span data-i18n="nav.activities">Activities</span>
      </button>
      <button class="bottom-nav-item" data-nav="reports">
        <span class="nav-icon" aria-hidden="true">📊</span>
        <span data-i18n="nav.reports">Reports</span>
      </button>
      <button class="bottom-nav-item" data-nav="auditlog">
        <span class="nav-icon" aria-hidden="true">📜</span>
        <span data-i18n="nav.log">Log</span>
      </button>
      <button class="bottom-nav-item" data-nav="settings">
        <span class="nav-icon" aria-hidden="true">⚙️</span>
        <span data-i18n="nav.settings">Settings</span>
      </button>
    </nav>

  </div><!-- #app -->

  <!-- Toast notification container -->
  <div id="toast-container" aria-live="polite" aria-atomic="false"></div>

  <!-- Scripts – load order matters; each file depends on those above it -->
  <script src="assets/js/config.js"></script>
  <script src="assets/js/utils.js"></script>

  <!-- Supabase JS client (UMD build – exposes window.supabase) -->
  <!-- Only used when SUPABASE_URL + SUPABASE_ANON_KEY are set in config.js -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>

  <!-- Initialise ICO.SupabaseClient (null when credentials absent) -->
  <script src="assets/js/services/supabaseClient.js"></script>

  <!-- Local (localStorage) service implementations – always loaded as fallback -->
  <script src="assets/js/services/storage.js"></script>
  <script src="assets/js/services/auditService.js"></script>
  <script src="assets/js/services/authService.js"></script>
  <script src="assets/js/services/activityService.js"></script>
  <script src="assets/js/services/paymentService.js"></script>
  <script src="assets/js/services/reportService.js"></script>

  <!-- Supabase service overrides – each replaces its ICO.* counterpart only
       when ICO.SupabaseClient is non-null.  Load order: audit → auth →
       activity so that higher-level services call the correct audit impl. -->
  <script src="assets/js/services/supabaseAuditService.js"></script>
  <script src="assets/js/services/supabaseAuthService.js"></script>
  <script src="assets/js/services/supabaseActivityService.js"></script>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
